variables:
  colombia_cocoa_price_cop_kg:
    label: "Colombian cocoa price"
    source_block: "colombia_domestic_prices"
    unit: "COP/kg"
    preferred_frequency: "monthly"
    transformation_notes:
      - "aggregate higher-frequency observations to monthly averages or medians"
      - "deflate with Colombian CPI when real-price analysis is required"

  world_cocoa_price_usd_mt:
    label: "World cocoa benchmark price"
    source_block: "international_prices"
    unit: "USD/metric_ton"
    preferred_frequency: "monthly"
    transformation_notes:
      - "use monthly average if source is daily"
      - "preserve source methodology in metadata"

  eu_hicp_chocolate_index:
    label: "EU chocolate or cocoa consumer price index"
    source_block: "eu_market_prices"
    unit: "index"
    preferred_frequency: "monthly"
    transformation_notes:
      - "retain base year metadata"
      - "log differences can be used as inflation-like growth measures"

  colombia_exports_cocoa_usd:
    label: "Colombian cocoa exports to Europe"
    source_block: "trade_linkages"
    unit: "USD"
    preferred_frequency: "monthly_or_annual"
    transformation_notes:
      - "disaggregate by HS code and partner where possible"

  cop_usd_exchange_rate:
    label: "COP to USD exchange rate"
    source_block: "macro_controls"
    unit: "COP/USD"
    preferred_frequency: "monthly"
    transformation_notes:
      - "monthly average preferred for alignment with price series"

  nasa_power_precipitation:
    label: "NASA POWER precipitation variable"
    source_block: "climate_extension"
    unit: "source_defined"
    preferred_frequency: "monthly"
    transformation_notes:
      - "derive anomalies only after confirming parameter definition"
